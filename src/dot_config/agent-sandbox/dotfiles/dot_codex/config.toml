#:schema https://developers.openai.com/codex/config-schema.json

# Model selection
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_context_window = 1000000
model_auto_compact_token_limit = 900000

# We update via agent-sandbox image pinning
check_for_update_on_startup = false

# Auth credentials stored in docker volume and preserved across restarts
cli_auth_credentials_store = "file"

# Disable Codex's internal Landlock/seccomp sandbox.
# Container-level sandboxing (iptables + proxy) handles isolation.
sandbox_mode = "danger-full-access"

# Instruct Codex to not stop at .git root, but look for the following files to determine project root
project_root_markers = [".agent-sandbox"]

# MCP - used fixed port to make it easier to open ports temporarily for auth
mcp_oauth_callback_url = "http://mcpauth:50000/callback"
mcp_oauth_callback_port = 50000

[features]
# Enable MCP
experimental_use_rmcp_client = true
# Prevent machine from going to sleep while running
prevent_idle_sleep = true

# Add MCP servers
[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"

[projects."/workspace"]
trust_level = "trusted"

